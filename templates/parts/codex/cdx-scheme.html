{{!-- Codex per-actor scheme strip (writes flags.starwarsffg.scheme via codex-sheets.js) --}}
<div class="cdx-scheme-strip">
  <span class="cdx-scheme-label">Scheme</span>
  <button type="button" class="cdx-scheme-btn" data-scheme="republic">Republic</button>
  <button type="button" class="cdx-scheme-btn" data-scheme="empire">Empire</button>
  <button type="button" class="cdx-scheme-btn" data-scheme="dark">Dark</button>
  <button type="button" class="cdx-scheme-btn" data-scheme="light">Light</button>
  <button type="button" class="cdx-scheme-btn" data-scheme="mercenary">Mercenary</button>
</div>
