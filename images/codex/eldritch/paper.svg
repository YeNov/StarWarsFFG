<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <title>Seamless charcoal paper texture</title>
  <desc>An original dark paper texture made from stitched procedural noise.</desc>
  <defs>
    <filter id="paper-grain" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.018 0.026"
        numOctaves="3"
        seed="43"
        stitchTiles="stitch"
        result="mottle"
      />
      <feColorMatrix in="mottle" type="saturate" values="0" result="mottle-gray" />
      <feComponentTransfer in="mottle-gray" result="mottle-tone">
        <feFuncR type="linear" slope="0.22" intercept="0.35" />
        <feFuncG type="linear" slope="0.20" intercept="0.36" />
        <feFuncB type="linear" slope="0.17" intercept="0.37" />
        <feFuncA type="table" tableValues="0 0.24" />
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="mottle-tone" mode="multiply" result="mottled-paper" />
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.72 0.86"
        numOctaves="4"
        seed="19"
        stitchTiles="stitch"
        result="fine-grain"
      />
      <feColorMatrix in="fine-grain" type="saturate" values="0" result="fine-gray" />
      <feComponentTransfer in="fine-gray" result="fine-tone">
        <feFuncR type="linear" slope="0.26" intercept="0.38" />
        <feFuncG type="linear" slope="0.24" intercept="0.39" />
        <feFuncB type="linear" slope="0.20" intercept="0.40" />
        <feFuncA type="table" tableValues="0 0.17" />
      </feComponentTransfer>
      <feBlend in="mottled-paper" in2="fine-tone" mode="soft-light" />
    </filter>
  </defs>
  <rect width="256" height="256" fill="#101311" filter="url(#paper-grain)" />
</svg>
